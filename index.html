<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora Lab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <canvas id="aurora"></canvas>
  </div>
  
  <div class="controls">
    <div class="control-section">
      <span class="section-label">Palette</span>
      <div class="color-pickers">
        <div class="color-picker">
          <input type="color" id="color1" value="#f5a8d1" aria-label="Rose">
          <label for="color1">Rose</label>
        </div>
        <div class="color-picker">
          <input type="color" id="color2" value="#c4b8f5" aria-label="Lilac">
          <label for="color2">Lilac</label>
        </div>
        <div class="color-picker">
          <input type="color" id="color3" value="#a8e8de" aria-label="Mint">
          <label for="color3">Mint</label>
        </div>
        <div class="color-picker">
          <input type="color" id="color4" value="#fccccb" aria-label="Peach">
          <label for="color4">Peach</label>
        </div>
        <div class="color-picker">
          <input type="color" id="color5" value="#e6a8f0" aria-label="Bloom">
          <label for="color5">Bloom</label>
        </div>
      </div>
      <button type="button" class="share-btn" id="shareBtn">Copy your aurora link</button>
    </div>

    <div class="control-group">
      <label>Speed</label>
      <input type="range" id="speed" min="0" max="100" value="30">
    </div>
    <div class="control-group">
      <label>Mouse</label>
      <input type="range" id="mouseInfluence" min="0" max="100" value="40">
    </div>
    <div class="control-group">
      <label>Intensity</label>
      <input type="range" id="intensity" min="0" max="100" value="50">
    </div>
    <div class="control-group">
      <label>Distortion</label>
      <input type="range" id="distortion" min="0" max="100" value="35">
    </div>
  </div>
  
  <script src="aurora.js"></script>
</body>
</html>
