<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora Lab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <canvas id="aurora"></canvas>
  </div>

  <div class="mood-card">
    <p class="mood-prompt">What's your mood today?</p>
    <div class="mood-grid" id="moodGrid"></div>
    <p class="mood-result" id="moodResult">Pick a mood to shape your aurora</p>

    <div class="spotify-divider"></div>

    <div class="spotify-section">
      <p class="spotify-label">Add your soundtrack</p>
      <p class="spotify-sub">Aurora reacts to the song playing in your Spotify app</p>

      <button type="button" class="spotify-connect-btn" id="spotifyConnectBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
        Connect Spotify
      </button>

      <div class="spotify-connected" id="spotifyConnected">
        <div class="vinyl-now-playing" id="spotifyNowPlaying">
          <div class="vinyl-stage">
            <div class="vinyl-aura"></div>
            <div class="vinyl-disc" id="vinylDisc">
              <img class="vinyl-art" id="vinylArt" alt="" />
              <div class="vinyl-grooves"></div>
              <div class="vinyl-label-dot"></div>
            </div>
          </div>
          <div class="vinyl-info">
            <span class="vinyl-now-label">Now playing</span>
            <span class="vinyl-track" id="spotifyTrack">Waiting for music…</span>
            <span class="vinyl-artist" id="spotifyArtist">Open Spotify and press play</span>
          </div>
        </div>
        <p class="mood-detect" id="moodDetect"></p>
        <button type="button" class="spotify-disconnect-btn" id="spotifyDisconnectBtn">Disconnect</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="control-section">
      <span class="section-label">Palette</span>
      <div class="color-pickers">
        <input type="color" id="color1" value="#f5a8d1" aria-label="Color 1">
        <input type="color" id="color2" value="#c4b8f5" aria-label="Color 2">
        <input type="color" id="color3" value="#a8e8de" aria-label="Color 3">
        <input type="color" id="color4" value="#fccccb" aria-label="Color 4">
        <input type="color" id="color5" value="#e6a8f0" aria-label="Color 5">
      </div>
      <div class="palette-actions">
        <button type="button" class="text-btn" id="resetBtn">Reset palette</button>
        <button type="button" class="share-btn" id="shareBtn">Copy your aurora link</button>
      </div>
    </div>

    <div class="control-group">
      <div class="control-label-row">
        <label for="speed">Speed</label>
        <span class="control-value" id="speedValue">30</span>
      </div>
      <input type="range" id="speed" min="10" max="50" value="30">
      <div class="control-scale"><span>10</span><span>50</span></div>
    </div>
    <div class="control-group">
      <div class="control-label-row">
        <label for="mouseInfluence">Mouse</label>
        <span class="control-value" id="mouseValue">30</span>
      </div>
      <input type="range" id="mouseInfluence" min="10" max="50" value="30">
      <div class="control-scale"><span>10</span><span>50</span></div>
    </div>
    <div class="control-group">
      <div class="control-label-row">
        <label for="intensity">Intensity</label>
        <span class="control-value" id="intensityValue">40</span>
      </div>
      <input type="range" id="intensity" min="10" max="50" value="40">
      <div class="control-scale"><span>10</span><span>50</span></div>
    </div>
    <div class="control-group">
      <div class="control-label-row">
        <label for="distortion">Distortion</label>
        <span class="control-value" id="distortionValue">40</span>
      </div>
      <input type="range" id="distortion" min="10" max="50" value="40">
      <div class="control-scale"><span>10</span><span>50</span></div>
    </div>
  </div>

  <script src="aurora.js"></script>
  <script src="spotify.js"></script>
</body>
</html>
